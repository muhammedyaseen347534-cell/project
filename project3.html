<!DOCTYPE html>
<html>
<head>
    <title>Post & Comments Viewer</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .post { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .comment { margin-left: 20px; background: #f9f9f9; padding: 5px; }
    </style>
</head>
<body>

<h2>Posts & Comments Viewer</h2>

<div id="posts"></div>

<script>
// Fetch posts
async function fetchPosts() {
    try {
        let res = await fetch("https://jsonplaceholder.typicode.com/posts");
        let posts = await res.json();

        displayPosts(posts.slice(0, 10)); // first 10
    } catch (error) {
        console.log(error);
    }
}

// Display posts
function displayPosts(posts) {
    let container = document.getElementById("posts");

    posts.forEach(post => {
        let div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <h3>${post.title}</h3>
            <p>${post.body}</p>
            <button onclick="toggleComments(${post.id}, this)">View Comments</button>
            <div id="comments-${post.id}"></div>
        `;

        container.appendChild(div);
    });
}

// Toggle comments
async function toggleComments(postId, btn) {
    let commentDiv = document.getElementById(`comments-${postId}`);

    // If already loaded → toggle
    if (commentDiv.innerHTML !== "") {
        commentDiv.innerHTML = "";
        btn.innerText = "View Comments";
        return;
    }

    // Show loading
    commentDiv.innerHTML = "Loading comments...";

    try {
        let res = await fetch(`https://jsonplaceholder.typicode.com/posts/${postId}/comments`);
        let comments = await res.json();

        commentDiv.innerHTML = "";

        comments.forEach(c => {
            let div = document.createElement("div");
            div.className = "comment";

            div.innerHTML = `
                <strong>${c.name}</strong><br>
                ${c.email}<br>
                <p>${c.body}</p>
            `;

            commentDiv.appendChild(div);
        });

        btn.innerText = "Hide Comments";

    } catch (error) {
        commentDiv.innerHTML = "Error loading comments";
    }
}

// Call function
fetchPosts();
</script>

</body>
</html>
